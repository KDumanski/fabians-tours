name: Deploy to GitHub Pages (RETIRED — site moved to Vercel)

# This site moved from a static GitHub Pages export to a server-rendered Next.js app on
# Vercel (real Google login + a database — see DEPLOY-VERCEL.md). The app no longer does
# `output: 'export'`, so there is no ./out to publish here. The auto-on-push trigger is
# disabled so a merge to main can't run a broken Pages build or fight the Vercel deploy.
# Left manual-only for reference; safe to delete once Vercel is confirmed live.
on:
  workflow_dispatch: # manual only

# Permissions required by the official Pages deploy actions
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deploy; don't cancel an in-progress one
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true # self-enable Pages so the first run can't race ahead of setup

      - name: Build (Next.js static export)
        # configure-pages sets steps.pages.outputs.base_path to /<repo>.
        # We pass it through BASE_PATH so next.config.mjs prefixes assets correctly.
        env:
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
